<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-sky-50 via-indigo-50 to-white p-4 sm:p-6 md:p-8">
  
  <div class="w-full max-w-md bg-white/70 backdrop-blur-lg p-8 sm:p-10 rounded-3xl shadow-2xl shadow-indigo-100/50 border border-white/80">
    
    <div class="text-center mb-10">
      <div class="mx-auto w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mb-5 shadow-inner border border-indigo-200">
        <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M12 11c0 1.657-1.343 3-3 3s-3-1.343-3-3 1.343-3 3-3 3 1.343 3 3zm6 8v-1a4 4 0 00-4-4H6a4 4 0 00-4 4v1">
          </path>
        </svg>
      </div>
      <h1 class="text-3xl sm:text-4xl font-extrabold text-slate-900">Crear Cuenta</h1>
      <p class="text-slate-600 mt-3">Regístrate para usar CSAS API</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="space-y-6">

      <!-- Nombre -->
      <input type="text" formControlName="name"
             placeholder="Nombre"
             class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-300">

      <!-- Apellido -->
      <input type="text" formControlName="lastname"
             placeholder="Apellido"
             class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-300">

      <!-- Username -->
      <input type="text" formControlName="username"
             placeholder="Usuario"
             class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-300">

      <!-- Password -->
      <input type="password" formControlName="password"
             placeholder="Contraseña"
             class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-300">

      <button type="submit" [disabled]="registerForm.invalid"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all disabled:opacity-50">
        Registrarse
      </button>
    </form>

    <div class="mt-8 text-center border-t pt-6">
      <p class="text-sm text-slate-600">
        ¿Ya tienes cuenta?
        <a routerLink="/login" class="text-indigo-600 font-bold hover:underline">
          Inicia sesión
        </a>
      </p>
    </div>

  </div>
</div>
