<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-sky-50 via-indigo-50 to-white p-4 sm:p-6 md:p-8">
  
  <div class="w-full max-w-md bg-white/70 backdrop-blur-lg p-8 sm:p-10 rounded-3xl shadow-2xl shadow-indigo-100/50 border border-white/80 transform transition-all hover:shadow-indigo-200/60">
    
    <div class="text-center mb-10">
      <div class="mx-auto w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mb-5 shadow-inner border border-indigo-200">
        <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
        </svg>
      </div>
      <h1 class="text-3xl sm:text-4xl font-extrabold text-slate-900 tracking-tight">¡Bienvenido!</h1>
      <p class="text-slate-600 mt-3 text-base sm:text-lg">Ingresa tus credenciales para continuar en CSAS API</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-7">
      
      <div class="space-y-2">
        <label for="username" class="block text-sm font-semibold text-slate-800 ml-1">Nombre de Usuario</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          </span>
          <input type="text" id="username" formControlName="username" 
                 class="w-full pl-12 pr-4 py-3.5 rounded-2xl border border-slate-200 bg-white/90 text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 focus:outline-none transition-all duration-200 shadow-sm"
                 placeholder="Tu usuario ej. jdoe">
        </div>
      </div>

      <div class="space-y-2">
        <label for="password" class="block text-sm font-semibold text-slate-800 ml-1">Contraseña</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          </span>
          <input type="password" id="password" formControlName="password" 
                 class="w-full pl-12 pr-4 py-3.5 rounded-2xl border border-slate-200 bg-white/90 text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 focus:outline-none transition-all duration-200 shadow-sm"
                 placeholder="••••••••••••">
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="loginForm.invalid"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all duration-300 transform hover:-translate-y-0.5 active:scale-95 disabled:opacity-60 disabled:cursor-not-allowed disabled:hover:translate-y-0 disabled:shadow-none">
          Iniciar Sesión Seguro
        </button>
      </div>
    </form>

    <div class="mt-10 text-center border-t border-slate-100 pt-8">
      <p class="text-sm text-slate-600">
        ¿Aún no tienes una cuenta? 
        <a href="/register" class="text-indigo-600 font-bold hover:text-indigo-800 hover:underline transition-colors ml-1.5">Regístrate gratis</a>
      </p>
    </div>
  </div>
</div>
