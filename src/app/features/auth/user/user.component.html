<div class="max-w-4xl mx-auto p-6 mt-10">

  <header class="mb-10 flex justify-between items-end">
    <div>
      <h1 class="text-3xl font-extrabold text-slate-900">Usuarios</h1>
      <p class="text-slate-500">Gestión de usuarios del sistema</p>
    </div>

    <span class="bg-indigo-100 text-indigo-700 px-4 py-1.5 rounded-full text-sm font-bold">
      {{ users().length }} Total
    </span>
  </header>

  <div class="space-y-4">
    @for (user of users(); track user.id) {

      <div class="group bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center hover:shadow-md">

        <div>
          <h3 class="font-bold text-slate-800">{{ user.name }}</h3>
          <p class="text-sm text-slate-500">{{ user.username }}</p>
        </div>

        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">

          <!-- ✏️ EDITAR -->
          <button (click)="openEditModal(user)"
                  class="p-2 text-indigo-500 hover:bg-indigo-50 rounded-lg">
            ✏️
          </button>

          <!-- 🗑️ ELIMINAR -->
          <button (click)="deleteUser(user.id)"
                  class="p-2 text-rose-500 hover:bg-rose-50 rounded-lg">
            🗑️
          </button>

        </div>

      </div>

    } @empty {
      <div class="text-center py-20 bg-slate-50 rounded-3xl border-dashed border-2">
        <p class="text-slate-400">No hay usuarios registrados</p>
      </div>
    }
  </div>
</div>

@if (isModalOpen) {
  <div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    
    <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-xl">
      
      <h2 class="text-xl font-bold mb-4 text-slate-800">Editar Usuario</h2>

      <input type="text" [(ngModel)]="editName"
             class="w-full mb-3 px-4 py-2 border rounded-lg"
             placeholder="Nombre">

      <input type="text" [(ngModel)]="editUsername"
             class="w-full mb-3 px-4 py-2 border rounded-lg"
             placeholder="Correo">

      <div class="flex justify-end gap-2">
        <button (click)="closeModal()"
                class="px-4 py-2 bg-slate-200 rounded-lg">
          Cancelar
        </button>

        <button (click)="updateUser()"
                class="px-4 py-2 bg-indigo-600 text-white rounded-lg">
          Guardar
        </button>
      </div>

    </div>
  </div>
}
